name: CI — Tests & Type Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── SMOKE TESTS (fast gate — must pass before anything else) ──
  smoke:
    name: 🚦 Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run smoke tests
        run: bun run vitest run src/test/smoke --reporter=verbose

  # ── INTERACTION TESTS (user journey validation) ───────────────
  interaction:
    name: 🔄 Interaction Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: smoke
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run interaction tests
        run: bun run vitest run src/test/interaction --reporter=verbose

  # ── TYPE CHECK (catches compile errors) ───────────────────────
  typecheck:
    name: 🔍 Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run tsc --noEmit

  # ── FULL SUITE (runs on main only — catches everything) ───────
  full-suite:
    name: ✅ Full Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main'
    needs: [smoke, interaction]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run all tests
        run: bun run vitest run src/test --reporter=verbose
